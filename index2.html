<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Tech Store</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;}

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:#111;
position:sticky;
top:0;
z-index:100;
}

.logo{font-size:22px;font-weight:bold;}
.cart{font-size:18px;cursor:pointer}

/* HERO */
.hero{
text-align:center;
padding:40px 20px;
background:linear-gradient(120deg,#00e5ff,#0072ff);
color:black;
}

.search-box input{
padding:10px;
width:250px;
border-radius:6px;
border:none;
}

/* FILTER */
.filters{text-align:center;margin:20px;}

.filters button.active{
background:#00c2d1;
}

/* GRID */
.container{max-width:1200px;margin:auto;padding:20px;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* CARD */
.product{
background:rgba(255,255,255,0.05);
border-radius:16px;
padding:20px;
text-align:center;
backdrop-filter:blur(10px);
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
position:relative;
}

.product:hover{
transform:translateY(-10px) scale(1.03);
}

/* IMAGE */
.product img{
width:100%;
max-width:220px;
margin:15px auto;
display:block;
transition:0.3s;
}

.product:hover img{transform:scale(1.1);}

/* PRICE */
.price{color:#00e5ff;font-size:18px;font-weight:bold;margin:10px 0;}

/* BUTTON */
button{
background:#00e5ff;
border:none;
padding:10px;
border-radius:8px;
margin:5px;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

button:hover{
background:#00c2d1;
transform:scale(1.05);
}

/* CART PANEL */
.cart-panel{
position:fixed;
top:0;
right:-350px;
width:350px;
height:100%;
background:#111;
padding:20px;
transition:0.3s;
overflow:auto;
z-index:200;
}

.cart-panel.active{right:0;}

.cart-item{
margin:10px 0;
border-bottom:1px solid #333;
padding-bottom:5px;
}

.total{
margin-top:15px;
font-size:18px;
color:#00e5ff;
}

</style>
</head>

<body>

<div class="cart" onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</div>

<!-- CART PANEL -->
<div class="cart-panel" id="cartPanel">
<h2>Cart</h2>
<div id="cartItems"></div>
<div class="total">Total: ₹<span id="total">0</span></div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addCart(name, price){
cart.push({name,price});
updateCart();
}

function updateCart(){
localStorage.setItem("cart",JSON.stringify(cart));

document.getElementById("cartCount").innerText=cart.length;

let html="";
let total=0;

cart.forEach((item,i)=>{
total+=item.price;
html+=`${item.name} - ₹${item.price} <button onclick="removeItem(${i})">❌</button><br>`;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerText=total;
}

function removeItem(i){
cart.splice(i,1);
updateCart();
}

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("active");
}

/* SEARCH */
function searchProduct(){
let input=document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".product").forEach(p=>{
p.style.display=p.innerText.toLowerCase().includes(input)?"block":"none";
});
}

/* FILTER */
function filter(cat,btn){
document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");

document.querySelectorAll(".product").forEach(p=>{
p.style.display=(cat==="all"||p.dataset.category===cat)?"block":"none";
});
}

updateCart();

</script>

</body>
